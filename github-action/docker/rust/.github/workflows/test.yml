name: Example Workflow

on:
  push:
    branches: [master]

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # 使用自定义的 Rust action
      - name: Run Docker Action
        id: docker-action
        uses: ./
        with:
          message: "GitHub Actions with Docker"
          name: "Bob"

      # 使用输出结果
      - name: Print greeting
        run: |
          echo "Greeting: ${{ steps.docker-action.outputs.greeting }}"
